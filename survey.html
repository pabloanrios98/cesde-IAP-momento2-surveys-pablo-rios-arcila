<body>

<form>

        <p>1. ¿Cuál es tu lenguaje de programación favorito?</p>

        <br>
        <label>Java</label>
        <input type="radio">
        <br>
        <br>

        <input type="radio">

        <input type="radio">
        <br>
        <br>

        <br>
